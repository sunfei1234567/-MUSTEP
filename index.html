<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSTEP 印像 - 澳门影像打印馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
         
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f7fb;
            background-image:
                linear-gradient(rgba(15, 54, 142, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 54, 142, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .splash-img {
            width: 580px;
            height: auto;
            max-width: 70vw;
            opacity: 0;
            transform: scale(1.3);
        }

        .splash-img.zoom-in {
            opacity: 1;
            transform: scale(1);
            transition:
                transform 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 1s ease;
        }

        .splash-img.move-to-corner {
            transform: translate(-35vw, -40vh) scale(0.35);
            transition:
                transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease;
            opacity: 1;
        }

        .splash.done {
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="splash" class="splash">
        <img src="./images/first-stage.webp" alt="MUSTEP 印像" class="splash-img">
    </div>

    <script>
        // Splash Animation
        const splash = document.getElementById('splash');
        const splashImg = document.querySelector('.splash-img');

        function startSplash() {
            if (!splash || !splashImg) return;

            requestAnimationFrame(() => {
                splashImg.classList.add('zoom-in');
            });

            setTimeout(() => {
                splashImg.classList.add('move-to-corner');
            }, 2500);

            setTimeout(() => {
                window.location.href = './home.html';
            }, 4000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startSplash);
        } else {
            startSplash();
        }
    </script>
</body>

</html>
